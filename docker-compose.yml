version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: polpol-db
    environment:
      MYSQL_DATABASE: polpol_db
      MYSQL_ROOT_PASSWORD: password
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  db_data:
